<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Fondo con gradientes sutiles */
  .bg-glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 700px 400px at 15% 50%, rgba(44,82,130,0.18), transparent),
      radial-gradient(ellipse 500px 300px at 85% 20%, rgba(0,113,227,0.10), transparent),
      radial-gradient(ellipse 400px 400px at 90% 80%, rgba(44,82,130,0.08), transparent);
  }

  /* Grid de puntos de fondo */
  .bg-dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Línea de acento izquierda */
  .accent-line {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, transparent, #2c5282, #0071e3, transparent);
  }

  .content {
    position: relative;
    z-index: 1;
    padding: 0 90px;
    width: 100%;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 36px;
  }

  .logo-mark {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg, #2c5282 0%, #0071e3 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(0,113,227,0.35);
  }

  .logo-mark span {
    font-size: 15px;
    font-weight: 900;
    color: white;
    letter-spacing: -0.3px;
  }

  .logo-name {
    font-size: 22px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    letter-spacing: -0.3px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(44,82,130,0.2);
    border: 1px solid rgba(44,82,130,0.4);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 600;
    color: #7ab0e8;
    margin-bottom: 22px;
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #0071e3;
  }

  h1 {
    font-size: 62px;
    font-weight: 800;
    color: white;
    line-height: 1.05;
    letter-spacing: -2.5px;
    margin-bottom: 20px;
  }

  h1 em {
    font-style: italic;
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 400;
    color: #5b9bd5;
  }

  .sub {
    font-size: 22px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
    line-height: 1.5;
    max-width: 600px;
    margin-bottom: 40px;
  }

  .pills {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .pill {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.65);
  }

  .pill strong {
    color: rgba(255,255,255,0.9);
    font-weight: 700;
  }

  .domain {
    position: absolute;
    bottom: 40px;
    right: 90px;
    font-size: 14px;
    color: rgba(255,255,255,0.25);
    font-weight: 500;
    letter-spacing: 0.3px;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-dots"></div>
  <div class="accent-line"></div>

  <div class="content">
    <div class="logo-row">
      <div class="logo-mark"><span>MBL</span></div>
      <span class="logo-name">MBL Studio</span>
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      Software para empresas españolas
    </div>

    <h1>Tu empresa,<br><em>digitalizada.</em></h1>

    <p class="sub">Aplicaciones a medida para pequeñas y medianas empresas. Sin complicaciones.</p>

    <div class="pills">
      <div class="pill"><strong>Desde 25€</strong>/mes</div>
      <div class="pill"><strong>Operativo</strong> en 48h</div>
      <div class="pill"><strong>Sin</strong> permanencia</div>
      <div class="pill"><strong>Soporte</strong> por WhatsApp</div>
    </div>
  </div>

  <div class="domain">landing.mblcorporacion.es</div>
</body>
</html>
